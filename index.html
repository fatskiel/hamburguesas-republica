<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Hamburguesas República</title>

<style>
body {
  font-family: Arial;
  background: #0f0f0f;
  color: white;
  margin: 0;
}

.header {
  background: #1a1a1a;
  padding: 20px;
  text-align: center;
  font-size: 22px;
  font-weight: bold;
  color: #f5b800;
}

.container {
  padding: 10px;
}

.card {
  background: #1c1c1c;
  border-radius: 15px;
  padding: 15px;
  margin-bottom: 15px;
}

.card h3 {
  margin: 0;
  color: #f5b800;
}

.card p {
  font-size: 14px;
  color: #ccc;
}

.controls {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 10px;
}

.controls button {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  border: none;
  background: #f5b800;
  font-size: 18px;
  cursor: pointer;
}

.price {
  font-weight: bold;
}

.cart {
  background: #1a1a1a;
  padding: 15px;
  border-radius: 15px;
  margin: 10px;
}

.footer {
  position: sticky;
  bottom: 0;
  background: #000;
  padding: 15px;
  text-align: center;
}

.btn {
  background: #25D366;
  color: white;
  padding: 15px;
  width: 90%;
  border: none;
  border-radius: 10px;
  font-size: 16px;
  cursor: pointer;
}

select {
  padding: 10px;
  margin-top: 10px;
  width: 100%;
  border-radius: 10px;
}
</style>

</head>

<body>

<div class="header">🍔 Hamburguesas República</div>

<div class="container">

<!-- MENU -->
<script>
const productos = [
  {id:"americana", nombre:"Americana", precio:8500, desc:"Carne, cheddar, panceta, cebolla y salsa de la casa"},
  {id:"republica", nombre:"La República", precio:8900, desc:"Carne, pepino, cheddar, lechuga y salsa estilo americano"},
  {id:"comun", nombre:"Común", precio:7000, desc:"Carne y queso"},
  {id:"especial", nombre:"Especial", precio:7500, desc:"Carne, jamón, queso, lechuga y tomate"},
  {id:"super", nombre:"Super", precio:8000, desc:"Carne, jamón, queso, lechuga, tomate y huevo"},
  {id:"barbacoa", nombre:"Barbacoa", precio:8500, desc:"Carne, cheddar, panceta, tomate y salsa barbacoa"}
];
</script>

<div id="menu"></div>

</div>

<div class="cart">
<h3>🛒 Tu pedido</h3>
<ul id="lista"></ul>

<p id="total">Total comida: $0</p>

<select id="zona" onchange="actualizar()">
<option value="1000">Zona 1 (27 → Río) - $1000</option>
<option value="1500">Zona 2 (27 → Oroño) - $1500</option>
<option value="2000">Zona 3 (Oroño → Río) - $2000</option>
</select>

<p id="totalFinal">Total final: $0</p>
</div>

<div class="footer">
<button class="btn" onclick="enviarPedido()">📲 Pedir por WhatsApp</button>
</div>

<script>

let carrito = {};

// GENERAR MENU AUTOMATICO (EVITA ERRORES)
let menuHTML = "";
productos.forEach(p => {
  menuHTML += `
  <div class="card">
    <h3>${p.nombre}</h3>
    <p>${p.desc}</p>
    <div class="controls">
      <button onclick="cambiar('${p.id}', -1)">-</button>
      <span class="price">$${p.precio}</span>
      <button onclick="cambiar('${p.id}', 1)">+</button>
    </div>
  </div>
  `;
});
document.getElementById("menu").innerHTML = menuHTML;

function cambiar(id, cantidad){

  let producto = productos.find(p => p.id === id);

  if(!carrito[id]){
    carrito[id] = {nombre: producto.nombre, precio: producto.precio, cantidad: 0};
  }

  carrito[id].cantidad += cantidad;

  if(carrito[id].cantidad <= 0){
    delete carrito[id];
  }

  actualizar();
}

function actualizar(){

  let lista = document.getElementById("lista");
  lista.innerHTML = "";

  let total = 0;

  for(let id in carrito){
    let item = carrito[id];
    let subtotal = item.precio * item.cantidad;

    lista.innerHTML += `<li>${item.nombre} x${item.cantidad} - $${subtotal}</li>`;
    total += subtotal;
  }

  let envio = parseInt(document.getElementById("zona").value);

  document.getElementById("total").innerText = "Total comida: $" + total;
  document.getElementById("totalFinal").innerText = "Total final: $" + (total + envio);
}

function enviarPedido(){

  if(Object.keys(carrito).length === 0){
    alert("Agregá algo al carrito primero");
    return;
  }

  let mensaje = "🍔 Hamburguesas República\n\n";
  mensaje += "Hola! Quiero pedir:\n\n";

  let total = 0;

  for(let id in carrito){
    let item = carrito[id];
    let subtotal = item.precio * item.cantidad;

    mensaje += `👉 ${item.nombre} x${item.cantidad} - $${subtotal}\n`;
    total += subtotal;
  }

  let envio = parseInt(document.getElementById("zona").value);

  mensaje += `\n🍔 Total comida: $${total}\n`;
  mensaje += `🚚 Envío: $${envio}\n`;
  mensaje += `💰 Total final: $${total + envio}\n\n`;

  mensaje += "📍 Zona: Rosario\n\n";
  mensaje += "Nombre:\nDirección:\nForma de pago:";

  let url = "https://wa.me/5493412688189?text=" + encodeURIComponent(mensaje);

  window.open(url, "_blank");
}

</script>

</body>
</html>
